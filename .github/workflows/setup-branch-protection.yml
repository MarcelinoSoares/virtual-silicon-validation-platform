name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  administration: write

jobs:
  protect:
    name: Apply branch protection to main
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection rules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection \
            --method PUT \
            --field enforce_admins=false \
            --field required_pull_request_reviews=null \
            --field restrictions=null \
            --field "required_status_checks[strict]=true" \
            --field "required_status_checks[contexts][]=quality" \
            --field "required_status_checks[contexts][]=test" \
            --field allow_force_pushes=false \
            --field allow_deletions=false
          echo "Branch protection applied to main." >> $GITHUB_STEP_SUMMARY
          echo "Required status checks: quality, test" >> $GITHUB_STEP_SUMMARY
          echo "Force pushes: blocked" >> $GITHUB_STEP_SUMMARY
